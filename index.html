<!DOCTYPE html>
<html>
<head>
  <title>Slice Frenzy</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="startScreen">
  <h1>🍉 Slice Frenzy</h1>
  <p id="highScore">High Score: 0</p>
  <button onclick="startGame()">Start</button>
</div>

<div id="gameUI" style="display:none;">
  <p id="score">Score: 0</p>
  <p id="lives">Lives: ❤️❤️❤️</p>
  <canvas id="gameCanvas"></canvas>
</div>

<div id="gameOver" style="display:none;">
  <h1>💀 Game Over</h1>
  <p id="finalScore"></p>
  <button onclick="restartGame()">Play Again</button>
</div>

<audio id="sliceSound" src="https://www.soundjay.com/button/sounds/button-16.mp3"></audio>
<audio id="bombSound" src="https://www.soundjay.com/button/sounds/button-10.mp3"></audio>
<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>

<script src="script.js"></script>
</body>
</html>
